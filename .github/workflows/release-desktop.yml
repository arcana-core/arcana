name: Release Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/desktop/package-lock.json
      - name: Install desktop deps
        working-directory: packages/desktop
        run: |
          npm ci --no-audit --no-fund

      - name: Build DMG (unsigned)
        env:
          ARCANA_CODESIGN: "0"
        working-directory: packages/desktop
        run: |
          npm run dist:mac:unsigned

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: arcana-desktop-dmg
          path: packages/desktop/dist/*.dmg

  build-windows:
    name: Build Windows MSI
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/desktop/package-lock.json
      - name: Install desktop deps
        working-directory: packages/desktop
        run: |
          npm ci --no-audit --no-fund

      - name: Build MSI
        working-directory: packages/desktop
        run: |
          npm run dist:win

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: arcana-desktop-msi
          path: packages/desktop/dist/*.msi

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows
    steps:
      - name: Download DMG
        uses: actions/download-artifact@v4
        with:
          name: arcana-desktop-dmg
          path: artifacts/dmg

      - name: Download MSI
        uses: actions/download-artifact@v4
        with:
          name: arcana-desktop-msi
          path: artifacts/msi

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          name: Arcana Desktop ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: |
            artifacts/dmg/*.dmg
            artifacts/msi/*.msi
