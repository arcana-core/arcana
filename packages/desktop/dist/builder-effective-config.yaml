directories:
  output: dist
  buildResources: build
  app: .
appId: io.arcana.desktop
productName: Arcana
files:
  - filter:
      - src/**/*
      - package.json
mac:
  target: dmg
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: entitlements.mac.plist
  entitlementsInherit: entitlements.mac.inherit.plist
afterSign: scripts/notarize.cjs
extraResources:
  - from: ../server
    to: server
  - from: ../src
    to: src
  - from: ../web
    to: web
  - from: ../skills
    to: skills
  - from: ../plugins
    to: plugins
  - from: ../tools
    to: tools
  - from: ../node_modules
    to: node_modules
electronVersion: 31.7.7
